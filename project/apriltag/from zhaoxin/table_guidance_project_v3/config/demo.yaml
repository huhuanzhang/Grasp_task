# Demo config for SINGLE-TAG homography (metric scale from tag_size_m).
reference_tag_id: 0

# Physical tag size (edge length of the black square), meters.
tag_size_m: 0.06

# AprilTag family
tag_family: "tag36h11"

# FastSAM (Ultralytics) defaults (can be overridden by CLI)
fastsam:
  imgsz: 640
  conf: 0.25
  iou: 0.9
